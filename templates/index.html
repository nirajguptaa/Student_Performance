<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
</head>
<body>

<h2>Student Performance Prediction</h2>

<form action="/predict" method="post">
    <input type="number" name="hours" placeholder="Hours Studied" required><br><br>
    <input type="number" name="score" placeholder="Previous Score" required><br><br>
    <button type="submit">Predict</button>
</form>

{% if prediction %}
    <h3>Result: {{ prediction }}</h3>
{% endif %}

</body>
</html>
